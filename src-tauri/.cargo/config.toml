# Cargo configuration for WisFlow Tauri backend
#
# Linux WSL development notes:
# Before running `cargo check` or `cargo build`, install system dependencies:
#   sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
#     librsvg2-dev libayatana-appindicator3-dev \
#     libasound2-dev libssl-dev
#
# Windows builds:
#   Run `npm run build` (tauri build) on a Windows machine or in CI with
#   a Windows runner. Tauri uses WebView2 on Windows (no GTK deps).
